services:
  app:
    build: .
    container_name: garageflow_app
    restart: unless-stopped
    env_file: .env
    volumes:
      - .:/var/www/html:cached
      - garageflow_vendor:/var/www/html/vendor
      - composer_cache:/root/.composer/cache
    networks:
      - garageflow
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine
    container_name: garageflow_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html:cached
      - garageflow_vendor:/var/www/html/vendor:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - garageflow
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: garageflow_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-garageflow}
      MYSQL_USER: ${DB_USERNAME:-garageflow}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - garageflow
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: garageflow_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - garageflow
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  mailpit:
    image: axllent/mailpit:latest
    container_name: garageflow_mail
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - garageflow

  adminer:
    image: adminer:4-standalone
    container_name: garageflow_adminer
    restart: unless-stopped
    ports:
      - "8888:8080"
    networks:
      - garageflow
    depends_on:
      - db

  # --- Optional workers (start with: docker compose --profile workers up -d) ---

  horizon:
    build: .
    container_name: garageflow_horizon
    restart: unless-stopped
    env_file: .env
    command: php artisan horizon
    volumes:
      - .:/var/www/html:cached
      - garageflow_vendor:/var/www/html/vendor
      - composer_cache:/root/.composer/cache
    networks:
      - garageflow
    depends_on:
      - app
      - db
      - redis
    profiles:
      - workers

  reverb:
    build: .
    container_name: garageflow_reverb
    restart: unless-stopped
    env_file: .env
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    volumes:
      - .:/var/www/html:cached
      - garageflow_vendor:/var/www/html/vendor
      - composer_cache:/root/.composer/cache
    ports:
      - "6001:8080"
    networks:
      - garageflow
    depends_on:
      - app
      - redis
    profiles:
      - workers

networks:
  garageflow:
    driver: bridge

volumes:
  db_data:
  redis_data:
  composer_cache:
  garageflow_vendor:
