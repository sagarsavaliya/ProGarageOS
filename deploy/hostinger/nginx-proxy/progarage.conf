# Install to: /var/www/nginx-proxy/conf.d/progarage.conf
# DNS: api.progarageos.com → 69.62.78.240

server {
    listen 80;
    server_name api.progarageos.com 69.62.78.240;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api.progarageos.com 69.62.78.240;

    ssl_certificate     /etc/letsencrypt/live/api.progarageos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.progarageos.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    client_max_body_size 64M;

    resolver 127.0.0.11 valid=30s ipv6=off;

    location / {
        set $upstream progarage_nginx;
        proxy_pass         http://$upstream:80;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
