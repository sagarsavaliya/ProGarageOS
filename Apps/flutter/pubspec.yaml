name: progarage
description: "Pro Garage OS — Garage operations platform by Akshara Technologies"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.3.0

dependencies:
  flutter:
    sdk: flutter

  # --- State Management ---
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # --- Navigation ---
  go_router: ^14.8.1

  # --- HTTP ---
  dio: ^5.7.0

  # --- Auth & Secure Storage ---
  flutter_secure_storage: ^9.2.2

  # --- Local DB ---
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.25
  path_provider: ^2.1.4
  path: ^1.9.0

  # --- Firebase ---
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6

  # --- UI & UX ---
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  fluttertoast: ^8.2.12
  flutter_svg: ^2.0.16
  lottie: ^3.3.1
  google_fonts: ^6.2.1
  fl_chart: ^0.67.0
  local_auth: ^2.3.0

  # --- Icons ---
  phosphor_flutter: ^2.1.0

  # --- Deep Links ---
  url_launcher: ^6.3.2
  share_plus: ^10.1.4

  # --- Media ---
  image_picker: ^1.1.2
  file_picker: ^8.1.7

  # --- Utils ---
  intl: ^0.20.1
  equatable: ^2.0.7
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # --- Code Generation ---
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.2
  drift_dev: ^2.22.1
  freezed: ^2.5.7
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/animations/
  # fonts: add Inter .ttf files to assets/fonts/ then uncomment
  # - family: Inter
  #   fonts:
  #     - asset: assets/fonts/Inter-Regular.ttf
  #     - asset: assets/fonts/Inter-Medium.ttf
  #       weight: 500
  #     - asset: assets/fonts/Inter-SemiBold.ttf
  #       weight: 600
  #     - asset: assets/fonts/Inter-Bold.ttf
  #       weight: 700
